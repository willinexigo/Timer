<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyage France 2026</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
    color:white;

    background: linear-gradient(
        120deg,
        #002654,
        #0055ff,
        #ffffff,
        #ff2b2b,
        #8b0000
    );

    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* watermark */
.watermark{
    position:fixed;
    bottom:-40px;
    left:50%;
    transform:translateX(-50%);
    font-size:300px;
    opacity:0.07;
    pointer-events:none;
}

/* container */
.container{
    text-align:center;
    padding:40px;
    z-index:2;
}

/* title */
.title{
    font-size:5rem;
    font-weight:900;
    letter-spacing:6px;
    margin-bottom:15px;

    background: linear-gradient(90deg,#0055ff,#ffffff,#ff2b2b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:0 0 25px rgba(255,255,255,0.4);
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* subtitle */
.subtitle{
    font-size:1.2rem;
    opacity:.85;
    margin-bottom:40px;
}

/* countdown */
.countdown{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.box{
    width:170px;
    height:170px;

    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);

    border-radius:25px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    box-shadow:0 10px 40px rgba(0,0,0,.25);
    transition:0.3s;
}

.box:hover{
    transform:translateY(-10px) scale(1.05);
}

.number{
    font-size:4rem;
    font-weight:800;
}

.label{
    font-size:1rem;
    letter-spacing:2px;
    text-transform:uppercase;
    opacity:.8;
}

/* fireworks */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

/* hidden test */
.testBtn{
    position:fixed;
    bottom:10px;
    right:10px;
    opacity:0;
    width:20px;
    height:20px;
}

/* mobile */
@media(max-width:800px){
    .title{font-size:3rem;}
    .box{width:130px;height:130px;}
    .number{font-size:3rem;}
}
</style>
</head>

<body>

<div class="watermark">🗼</div>

<div class="testBtn" id="testBtn"></div>

<canvas id="fireworks"></canvas>

<div class="container">

    <div class="title">VOYAGE FRANCE 2026</div>

    <div class="subtitle">June 20, 2026 • 23:00 (11 PM sharp)</div>

    <div class="countdown">

        <div class="box"><div class="number" id="days">0</div><div class="label">Days</div></div>
        <div class="box"><div class="number" id="hours">0</div><div class="label">Hours</div></div>
        <div class="box"><div class="number" id="minutes">0</div><div class="label">Minutes</div></div>
        <div class="box"><div class="number" id="seconds">0</div><div class="label">Seconds</div></div>

    </div>

</div>

<script>

/* ================= COUNTDOWN ================= */
const targetDate = new Date("June 20, 2026 23:00:00").getTime();

let fireworksStarted = false;

function updateCountdown(){
    const now = new Date().getTime();
    const distance = targetDate - now;

    if(distance <= 0 && !fireworksStarted){
        fireworksStarted = true;
        startFireworks();

        document.body.innerHTML = `
        <div style="
        font-size:5rem;
        font-weight:900;
        text-align:center;">
        BON VOYAGE 🇫🇷
        </div>`;
        return;
    }

    document.getElementById("days").innerText = Math.floor(distance/(1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((distance/(1000*60*60))%24);
    document.getElementById("minutes").innerText = Math.floor((distance/(1000*60))%60);
    document.getElementById("seconds").innerText = Math.floor((distance/1000)%60);
}

setInterval(updateCountdown,1000);
updateCountdown();

/* ================= FIREWORKS ================= */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function Particle(x,y){
    this.x = x;
    this.y = y;
    this.vx = (Math.random()-0.5)*6;
    this.vy = (Math.random()-0.5)*6;
    this.alpha = 1;
    this.color = `hsl(${Math.random()*360},100%,60%)`;
}

function explode(x,y){
    for(let i=0;i<80;i++){
        particles.push(new Particle(x,y));
    }
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.1)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.01;

        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x,p.y,3,3);

        if(p.alpha <= 0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}

function startFireworks(){
    setInterval(()=>{
        explode(Math.random()*canvas.width, Math.random()*canvas.height/2);
    },300);

    animate();
}

/* ================= TEST BUTTON ================= */
document.addEventListener("keydown",(e)=>{
    if(e.key.toLowerCase() === "t"){
        startFireworks();
    }
});

document.getElementById("testBtn").addEventListener("click", startFireworks);

</script>

</body>
</html>
