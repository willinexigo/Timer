<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SAAQ Countdown</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:Arial,sans-serif;overflow:hidden;color:#fff;background:linear-gradient(135deg,#003da5,#0057d9,#6ba8ff,#fff);background-size:400% 400%;animation:bg 12s ease infinite}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
canvas{position:fixed;inset:0;pointer-events:none}
.watermark{position:fixed;bottom:-40px;left:50%;transform:translateX(-50%);font-size:300px;opacity:.06}
.container{text-align:center;padding:40px;z-index:1}
.logo{width:min(700px,90vw);margin:0 auto 25px;display:block;filter:drop-shadow(0 8px 20px rgba(0,0,0,.25))}
.subtitle{font-size:2rem;font-weight:700;margin-bottom:35px}
.countdown{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.box{width:170px;height:170px;border-radius:25px;background:rgba(255,255,255,.12);backdrop-filter:blur(20px);display:flex;flex-direction:column;justify-content:center;align-items:center;border:1px solid rgba(255,255,255,.25);box-shadow:0 10px 40px rgba(0,0,0,.25)}
.number{font-size:4rem;font-weight:800} .label{opacity:.8;letter-spacing:2px;text-transform:uppercase}

/* Mobile UI */
@media (max-width: 600px){
 body{padding:15px;overflow:auto;align-items:center}
 .container{width:100%;padding:20px 10px}
 .logo{width:85vw;max-width:360px;margin-bottom:18px}
 .subtitle{font-size:1.2rem;margin-bottom:20px}
 .countdown{gap:10px;width:100%}
 .box{width:calc(50% - 5px);height:120px;border-radius:18px}
 .number{font-size:2.5rem}
 .label{font-size:.7rem;letter-spacing:1px}
 .watermark{font-size:150px;bottom:-20px}
}
@media (max-width:360px){
 .box{height:100px}
 .number{font-size:2rem}
}
</style></head><body>
